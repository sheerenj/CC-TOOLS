<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCB Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c0c0f;
  --surface: #111115;
  --border:  #232330;
  --text:    #c4c4d4;
  --dim:     #52526a;
  --hi:      #6655ee;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Roboto Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  height: 100vh;
  overflow: hidden;
  display: flex;
}

#canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0e0e13;
  padding: 16px;
  min-width: 0;
}

#c {
  max-width: 100%;
  max-height: 100%;
  display: block;
}

#panel {
  width: 270px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

#scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* ── Upload ─────────────────────────────────── */
.upload-zone {
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  transition: border-color 0.18s, background 0.18s;
  text-align: center;
}
.upload-zone:hover, .upload-zone.over {
  border-color: var(--dim);
  background: rgba(255,255,255,0.025);
}
.upload-arrow { font-size: 20px; color: var(--dim); line-height: 1; }
.upload-hint  { color: var(--dim); font-size: 10px; line-height: 1.5; }
.upload-name  { color: var(--text); font-size: 10px; word-break: break-all; margin-top: 2px; }

/* ── Section label ──────────────────────────── */
.sec-lbl {
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--dim);
  margin-bottom: 10px;
}

/* ── Row ────────────────────────────────────── */
.row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 7px;
}
.row label {
  width: 64px;
  flex-shrink: 0;
  color: var(--dim);
  font-size: 10px;
}
.row .val {
  width: 30px;
  text-align: right;
  flex-shrink: 0;
  color: var(--text);
}

/* ── Range ──────────────────────────────────── */
input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  outline: none;
  cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--text);
  cursor: pointer;
}
input[type="range"]:hover::-webkit-slider-thumb { background: #fff; }

/* ── Color picker ───────────────────────────── */
input[type="color"] {
  flex: 1;
  height: 22px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: none;
  padding: 1px 3px;
  cursor: pointer;
}

/* ── Mode buttons ───────────────────────────── */
.btn-row { flex: 1; display: flex; gap: 4px; }

.mbtn {
  flex: 1;
  padding: 5px 2px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--dim);
  font-family: inherit;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.14s;
}
.mbtn:hover { color: var(--text); border-color: var(--dim); }
.mbtn.on { background: var(--hi); border-color: var(--hi); color: #fff; }

/* ── Toggle / small buttons ─────────────────── */
.tbtn {
  flex: 1;
  padding: 7px 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--dim);
  font-family: inherit;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.14s;
  white-space: nowrap;
}
.tbtn:hover { color: var(--text); border-color: var(--dim); }
.tbtn.on { background: #1a2e1a; border-color: #3a5e3a; color: #80e880; }

/* ── Hint text ──────────────────────────────── */
.hint {
  color: var(--dim);
  font-size: 9px;
  line-height: 1.65;
  text-transform: none;
  letter-spacing: 0;
  padding: 2px 0 4px;
}

/* ── Footer ─────────────────────────────────── */
#foot {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.btn {
  flex: 1;
  padding: 9px 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text);
  font-family: inherit;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.14s;
}
.btn:hover { border-color: var(--dim); color: #fff; }
.btn.primary { background: var(--hi); border-color: var(--hi); color: #fff; }
.btn.primary:hover { background: #7a6aff; }
</style>
</head>
<body>

<div id="canvas-area">
  <svg id="c" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 1000 1000" width="1000" height="1000">
    <defs>
      <pattern id="dot-grid" x="20" y="20" width="40" height="40"
               patternUnits="userSpaceOnUse">
        <circle cx="0" cy="0" r="0.65" fill="rgba(255,255,255,0.04)"/>
      </pattern>
    </defs>
    <rect id="svg-bg" width="1000" height="1000" fill="#17171d"/>
    <rect width="1000" height="1000" fill="url(#dot-grid)"/>
    <image id="svg-overlay" style="display:none" preserveAspectRatio="none"/>
    <g id="traces"></g>
    <g id="pads"></g>
    <g id="comps"></g>
  </svg>
  <!-- Hidden canvas used only for luminosity sampling -->
  <canvas id="lum-c" width="1000" height="1000" style="display:none"></canvas>
</div>

<aside id="panel">
  <div id="scroll">

    <!-- Upload -->
    <div>
      <div class="upload-zone" id="upload-zone">
        <div class="upload-arrow">↑</div>
        <div class="upload-hint">Drop image or click<br>Bright pixels → dense nodes</div>
        <div class="upload-name" id="upload-name"></div>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>

    <!-- Image preview (shown after upload) -->
    <div id="img-section" style="display:none">
      <div class="sec-lbl">Image Preview</div>
      <div class="row">
        <button class="tbtn" id="btnToggle">Show Image</button>
        <button class="tbtn" id="btnReset" style="flex:0;padding:7px 10px">Reset</button>
      </div>
      <div id="overlay-opts" style="display:none">
        <div class="row">
          <label>Opacity</label>
          <input type="range" id="sOpacity" min="0.05" max="1" step="0.05" value="0.5">
          <span class="val" id="vOpacity">0.5</span>
        </div>
        <p class="hint">Drag canvas to reposition · Scroll to resize</p>
      </div>
    </div>

    <!-- Components -->
    <div>
      <div class="sec-lbl">Components</div>
      <div class="row">
        <label>Count</label>
        <input type="range" id="sCount" min="30" max="1500" step="10" value="130">
        <span class="val" id="vCount">130</span>
      </div>
      <div class="row">
        <label>Spread</label>
        <input type="range" id="sSpread" min="0" max="100" value="1">
        <span class="val" id="vSpread">1</span>
      </div>
      <div class="row">
        <label>Density</label>
        <input type="range" id="sDensity" min="0.2" max="5" step="0.1" value="2.3">
        <span class="val" id="vDensity">2.3</span>
      </div>
    </div>

    <!-- Traces -->
    <div>
      <div class="sec-lbl">Traces</div>
      <div class="row">
        <label>Max Dist</label>
        <input type="range" id="sMaxDist" min="20" max="400" value="120">
        <span class="val" id="vMaxDist">120</span>
      </div>
      <div class="row">
        <label>Routing</label>
        <div class="btn-row">
          <button class="mbtn on" data-mode="strict">Strict</button>
          <button class="mbtn" data-mode="diagonal">Diag</button>
          <button class="mbtn" data-mode="flow">Flow</button>
        </div>
      </div>
      <div class="row">
        <label>Diag Amt</label>
        <input type="range" id="sDiagAmt" min="0" max="100" value="30">
        <span class="val" id="vDiagAmt">30</span>
      </div>
    </div>

    <!-- Sizes -->
    <div>
      <div class="sec-lbl">Sizes</div>
      <div class="row">
        <label>Comp</label>
        <input type="range" id="sComp" min="1" max="14" step="0.5" value="5.5">
        <span class="val" id="vComp">5.5</span>
      </div>
      <div class="row">
        <label>Trace</label>
        <input type="range" id="sTrace" min="0.3" max="7" step="0.1" value="1.2">
        <span class="val" id="vTrace">1.2</span>
      </div>
      <div class="row">
        <label>Pad</label>
        <input type="range" id="sPad" min="1.5" max="16" step="0.5" value="1.5">
        <span class="val" id="vPad">1.5</span>
      </div>
      <div class="row">
        <label>Bevel</label>
        <input type="range" id="sBevel" min="0" max="6" step="0.2" value="0">
        <span class="val" id="vBevel">0</span>
      </div>
    </div>

    <!-- Color -->
    <div>
      <div class="sec-lbl">Color</div>
      <div class="row">
        <label>Threshold</label>
        <input type="range" id="sThresh" min="0" max="100" value="15">
        <span class="val" id="vThresh">15</span>
      </div>
      <div class="row">
        <label>Invert</label>
        <button class="tbtn on" id="btnInvert">Dark → Dense</button>
      </div>
      <div class="row">
        <label>Background</label>
        <input type="color" id="sBgColor" value="#000000">
      </div>
      <div class="row">
        <label>Comp</label>
        <input type="color" id="sCompColor" value="#39ff14">
      </div>
      <div class="row">
        <label>Accent</label>
        <input type="color" id="sAccent" value="#39ff14">
      </div>
      <div class="row">
        <label>Accent %</label>
        <input type="range" id="sAccentPct" min="0" max="100" value="30">
        <span class="val" id="vAccentPct">30</span>
      </div>
    </div>

  </div>

  <div id="foot">
    <button class="btn" id="btnRegen">Regenerate</button>
    <div style="display:flex;gap:7px">
      <button class="btn" id="btnExportPNG">Export PNG</button>
      <button class="btn primary" id="btnExportSVG">Export SVG</button>
    </div>
  </div>
</aside>

<script>
// ── SVG setup ─────────────────────────────────────────────────────────────────

const NS  = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('c');
const CW  = 1000, CH = 1000;

const tracesG    = document.getElementById('traces');
const padsG      = document.getElementById('pads');
const compsG     = document.getElementById('comps');
const overlayImg = document.getElementById('svg-overlay');

// Hidden canvas for luminosity pixel sampling only
const lumCanvas = document.getElementById('lum-c');
const lumCtx    = lumCanvas.getContext('2d');

// ── Image state ───────────────────────────────────────────────────────────────

let sourceImg      = null;   // loaded Image element (for naturalWidth/Height, coverFit)
let sourceImgDataUrl = null; // JPEG data URL embedded in SVG image element
let lumData        = null;   // pixel data from lum canvas

// ── Overlay state ─────────────────────────────────────────────────────────────

let showOverlay  = false;
let overlayAlpha = 0.5;
let imgTx = { x: 0, y: 0, scale: 1 };

// ── Params ────────────────────────────────────────────────────────────────────

const P = {
  count:     130,
  spread:    1,
  density:   2.3,
  maxDist:   120,
  mode:      'strict',
  diagAmt:   30,
  comp:      5.5,
  trace:     1.2,
  pad:       1.5,
  bevel:     0,
  threshold: 0.15,
  invert:    true,
  accent:    '#39ff14',
  accentPct: 30,
  compColor: '#39ff14',
  bgColor:   '#000000',
};

let nodes = [];
let edges = [];

// ── SVG helpers ───────────────────────────────────────────────────────────────

function svgEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function n2(v) { return v.toFixed(2); }

// ── Luminosity sampling ───────────────────────────────────────────────────────

function getLum(x, y) {
  if (!lumData) return 1;
  const xi = Math.max(0, Math.min(CW - 1, x | 0));
  const yi = Math.max(0, Math.min(CH - 1, y | 0));
  const i  = (yi * CW + xi) * 4;
  const l  = (lumData[i]*0.299 + lumData[i+1]*0.587 + lumData[i+2]*0.114) / 255;
  return P.invert ? 1 - l : l;
}

// ── Node generation ───────────────────────────────────────────────────────────

function genNodes() {
  const { count, threshold, spread, density } = P;
  const minDist = Math.sqrt(CW * CH / count) * (spread / 100) * 0.85;
  const range   = 1.0 - threshold + 1e-6;
  const out     = [];
  let   tries   = 0;

  while (out.length < count && tries < count * 120) {
    tries++;
    const x   = Math.random() * CW;
    const y   = Math.random() * CH;
    const lum = getLum(x, y);
    if (lum < threshold) continue;
    const t = (lum - threshold) / range;
    if (Math.random() > Math.pow(t, density)) continue;
    if (minDist > 1) {
      let ok = true;
      for (const nd of out) {
        const dx = x - nd.x, dy = y - nd.y;
        if (dx*dx + dy*dy < minDist*minDist) { ok = false; break; }
      }
      if (!ok) continue;
    }
    out.push({ x, y });
  }
  return out;
}

// ── Edge building ─────────────────────────────────────────────────────────────

function genEdges(nds) {
  const md2     = P.maxDist * P.maxDist;
  const edgeSet = new Set();
  for (let i = 0; i < nds.length; i++) {
    const nbrs = [];
    for (let j = 0; j < nds.length; j++) {
      if (i === j) continue;
      const dx = nds[i].x - nds[j].x, dy = nds[i].y - nds[j].y;
      const d2 = dx*dx + dy*dy;
      if (d2 <= md2) nbrs.push({ j, d2 });
    }
    nbrs.sort((a, b) => a.d2 - b.d2);
    nbrs.slice(0, 5).forEach(({ j }) => {
      edgeSet.add(i < j ? `${i}_${j}` : `${j}_${i}`);
    });
  }
  return [...edgeSet].map(k => {
    const [i, j] = k.split('_').map(Number);
    return {
      i, j,
      accent:     Math.random() * 100 < P.accentPct,
      useDiag:    Math.random() * 100 < P.diagAmt,
      horizFirst: Math.random() > 0.5,
      flowSign:   Math.random() > 0.5 ? 1 : -1,
    };
  });
}

// ── Routing ───────────────────────────────────────────────────────────────────

function routePts(x1, y1, x2, y2, useDiag, horizFirst) {
  const dx  = x2 - x1, dy  = y2 - y1;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  const sx  = dx < 0 ? -1 : 1, sy = dy < 0 ? -1 : 1;

  if (adx < 1) return [[x1, y1], [x1, y2]];
  if (ady < 1) return [[x1, y1], [x2, y1]];

  const maxC = Math.min(P.trace * 5, adx * 0.38, ady * 0.38, 12);

  if (useDiag || P.mode === 'diagonal') {
    // Sharp corners — all segments exactly 0°, 45°, or 90°
    if (adx >= ady) {
      const excess = adx - ady;
      if (excess < 1) return [[x1, y1], [x2, y2]];
      return horizFirst
        ? [[x1,y1], [x1+sx*excess, y1],        [x2,y2]]
        : [[x1,y1], [x1+sx*ady,    y1+sy*ady],  [x2,y2]];
    } else {
      const excess = ady - adx;
      if (excess < 1) return [[x1, y1], [x2, y2]];
      return horizFirst
        ? [[x1,y1], [x1+sx*adx, y1+sy*adx], [x2,y2]]
        : [[x1,y1], [x1,        y1+sy*excess], [x2,y2]];
    }
  }

  // Strict L with 45° chamfered corner
  return horizFirst
    ? [[x1,y1], [x2-sx*maxC, y1], [x2, y1+sy*maxC], [x2,y2]]
    : [[x1,y1], [x1, y2-sy*maxC], [x1+sx*maxC, y2], [x2,y2]];
}

// ── Path data builders ────────────────────────────────────────────────────────

function polylinePath(pts) {
  let d = `M${n2(pts[0][0])},${n2(pts[0][1])}`;
  for (let i = 1; i < pts.length; i++) d += ` L${n2(pts[i][0])},${n2(pts[i][1])}`;
  return d;
}

function bezPath(x1, y1, x2, y2, sign) {
  const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy) || 1;
  const px = (-dy/len)*len*sign*0.26, py = (dx/len)*len*sign*0.26;
  return `M${n2(x1)},${n2(y1)} C${n2(x1+dx*.35+px)},${n2(y1+dy*.35+py)} ${n2(x2-dx*.35+px)},${n2(y2-dy*.35+py)} ${n2(x2)},${n2(y2)}`;
}

// ── SVG draw functions ────────────────────────────────────────────────────────

function renderTrace(e, color, frag) {
  const x1 = nodes[e.i].x, y1 = nodes[e.i].y;
  const x2 = nodes[e.j].x, y2 = nodes[e.j].y;
  const w = P.trace, b = P.bevel;
  const d = P.mode === 'flow'
    ? bezPath(x1, y1, x2, y2, e.flowSign)
    : polylinePath(routePts(x1, y1, x2, y2, e.useDiag, e.horizFirst));
  const base = { fill:'none', 'stroke-linecap':'square', 'stroke-linejoin':'miter' };

  frag.appendChild(svgEl('path', { ...base, d,
    stroke: 'rgba(0,0,0,0.55)',
    'stroke-width': n2(w + b*2.2),
    transform: `translate(${n2(b*.9)},${n2(b*.9)})`,
  }));
  frag.appendChild(svgEl('path', { ...base, d,
    stroke: 'rgba(255,255,255,0.22)',
    'stroke-width': n2(w + b*.8),
    transform: `translate(${n2(-b*.45)},${n2(-b*.45)})`,
  }));
  frag.appendChild(svgEl('path', { ...base, d,
    stroke: color,
    'stroke-width': n2(w),
  }));
}

function renderPad(n, color, frag) {
  const x = n.x, y = n.y, rv = P.pad, b = P.bevel * 0.55;
  frag.appendChild(svgEl('circle', {
    cx: n2(x+b), cy: n2(y+b), r: n2(rv+.5),
    fill: 'none', stroke: 'rgba(0,0,0,0.5)', 'stroke-width': n2(b*1.4+.5),
  }));
  frag.appendChild(svgEl('circle', {
    cx: n2(x-b*.35), cy: n2(y-b*.35), r: n2(rv),
    fill: 'none', stroke: 'rgba(255,255,255,0.16)', 'stroke-width': '1',
  }));
  frag.appendChild(svgEl('circle', {
    cx: n2(x), cy: n2(y), r: n2(rv),
    fill: 'none', stroke: color, 'stroke-width': '1',
  }));
  frag.appendChild(svgEl('circle', {
    cx: n2(x), cy: n2(y), r: n2(rv*.26),
    fill: color,
  }));
}

function renderComp(n, frag) {
  const x = n.x, y = n.y, rv = P.comp, b = P.bevel * 0.45;
  frag.appendChild(svgEl('circle', {
    cx: n2(x+b), cy: n2(y+b), r: n2(rv),
    fill: 'rgba(0,0,0,0.4)',
  }));
  frag.appendChild(svgEl('circle', {
    cx: n2(x), cy: n2(y), r: n2(rv),
    fill: P.compColor,
  }));
}

// ── Image overlay helpers ─────────────────────────────────────────────────────

function coverFit() {
  const iAR = sourceImg.naturalWidth / sourceImg.naturalHeight;
  const cAR = CW / CH;
  let sw, sh, sx, sy;
  if (iAR > cAR) { sh = CH; sw = sh*iAR; sx = (CW-sw)/2; sy = 0; }
  else            { sw = CW; sh = sw/iAR; sx = 0; sy = (CH-sh)/2; }
  return { x: sx, y: sy, w: sw, h: sh };
}

function updateOverlay() {
  if (!showOverlay || !sourceImgDataUrl) { overlayImg.style.display = 'none'; return; }
  const b  = coverFit();
  const cx = b.x + b.w/2, cy = b.y + b.h/2;
  const w  = b.w * imgTx.scale, h = b.h * imgTx.scale;
  overlayImg.setAttribute('href', sourceImgDataUrl);
  overlayImg.setAttribute('x',       n2(cx - w/2 + imgTx.x));
  overlayImg.setAttribute('y',       n2(cy - h/2 + imgTx.y));
  overlayImg.setAttribute('width',   n2(w));
  overlayImg.setAttribute('height',  n2(h));
  overlayImg.setAttribute('opacity', overlayAlpha);
  overlayImg.style.display = '';
}

// ── Main render ───────────────────────────────────────────────────────────────

const svgBg = document.getElementById('svg-bg');

function render() {
  svgBg.setAttribute('fill', P.bgColor);
  tracesG.innerHTML = '';
  padsG.innerHTML   = '';
  compsG.innerHTML  = '';

  updateOverlay();
  if (!nodes.length) return;

  const base   = 'rgba(208,214,222,0.88)';
  const accent = P.accent;
  const nodeAccent = new Uint8Array(nodes.length);
  edges.forEach(e => { if (e.accent) { nodeAccent[e.i]=1; nodeAccent[e.j]=1; } });

  const tf = document.createDocumentFragment();
  const pf = document.createDocumentFragment();
  const cf = document.createDocumentFragment();

  edges.forEach(e => renderTrace(e, e.accent ? accent : base, tf));
  nodes.forEach((n, i) => renderPad(n, nodeAccent[i] ? accent : base, pf));
  nodes.forEach(n => renderComp(n, cf));

  tracesG.appendChild(tf);
  padsG.appendChild(pf);
  compsG.appendChild(cf);
}

// ── Pipeline ──────────────────────────────────────────────────────────────────

function regenAll()   { nodes = genNodes(); edges = genEdges(nodes); render(); }
function regenEdges() { edges = genEdges(nodes); render(); }

// ── Lum map builder ───────────────────────────────────────────────────────────
// Draws the source image onto the hidden canvas using the same transform as
// the SVG overlay so node density always matches the image's visible position.

function buildLumMap() {
  if (!sourceImg) return;
  lumCtx.clearRect(0, 0, CW, CH);
  const b  = coverFit();
  const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
  const w  = b.w * imgTx.scale, h = b.h * imgTx.scale;
  lumCtx.drawImage(sourceImg, cx - w/2 + imgTx.x, cy - h/2 + imgTx.y, w, h);
  lumData = lumCtx.getImageData(0, 0, CW, CH).data;
}

// ── Image loading ─────────────────────────────────────────────────────────────

function loadImageFile(file) {
  document.getElementById('upload-name').textContent = file.name;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    sourceImg = img;
    imgTx     = { x: 0, y: 0, scale: 1 };

    // Build lum pixel map using current (reset) imgTx
    buildLumMap();

    // JPEG data URL for SVG <image> — stored at ≤800px wide to stay small
    const maxW = 800;
    const ar   = img.naturalWidth / img.naturalHeight;
    const iw   = Math.min(img.naturalWidth, maxW);
    const ih   = Math.round(iw / ar);
    const tmp  = document.createElement('canvas');
    tmp.width  = iw; tmp.height = ih;
    tmp.getContext('2d').drawImage(img, 0, 0, iw, ih);
    sourceImgDataUrl = tmp.toDataURL('image/jpeg', 0.88);

    URL.revokeObjectURL(url);
    document.getElementById('img-section').style.display = '';
    regenAll();
  };
  img.src = url;
}

// ── SVG coordinate from mouse event ──────────────────────────────────────────

function svgPt(e) {
  const r = svg.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) / r.width  * CW,
    y: (e.clientY - r.top)  / r.height * CH,
  };
}

// ── Drag & scroll for image overlay ──────────────────────────────────────────

let dragging = false, dragOrigin = null;

svg.addEventListener('mousedown', e => {
  if (!showOverlay) return;
  e.preventDefault();
  dragging   = true;
  const c    = svgPt(e);
  dragOrigin = { cx: c.x, cy: c.y, ox: imgTx.x, oy: imgTx.y };
  svg.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const c = svgPt(e);
  imgTx.x = dragOrigin.ox + (c.x - dragOrigin.cx);
  imgTx.y = dragOrigin.oy + (c.y - dragOrigin.cy);
  render();
});

let lumRebuildTimer = null;
function scheduleLumRebuild() {
  clearTimeout(lumRebuildTimer);
  lumRebuildTimer = setTimeout(() => { buildLumMap(); regenAll(); }, 350);
}

window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  svg.style.cursor = showOverlay ? 'grab' : 'default';
  // Rebuild lum map and regenerate now that the image is repositioned
  if (sourceImg) { buildLumMap(); regenAll(); }
});

svg.addEventListener('wheel', e => {
  if (!showOverlay || !sourceImg) return;
  e.preventDefault();
  const { x: mx, y: my } = svgPt(e);
  const b  = coverFit();
  const cx = b.x + b.w/2, cy = b.y + b.h/2;
  const f  = e.deltaY > 0 ? 0.92 : 1.09;
  const ns = Math.max(0.05, Math.min(12, imgTx.scale * f));
  const af = ns / imgTx.scale;
  imgTx.x  = (mx - cx) * (1 - af) + imgTx.x * af;
  imgTx.y  = (my - cy) * (1 - af) + imgTx.y * af;
  imgTx.scale = ns;
  render();
  // Debounce lum rebuild — regenerating on every wheel tick would be too slow
  scheduleLumRebuild();
}, { passive: false });

// ── Controls wiring ───────────────────────────────────────────────────────────

function wire(sid, vid, key, action, transform) {
  const sl = document.getElementById(sid);
  const vl = document.getElementById(vid);
  sl.addEventListener('input', () => {
    const raw = parseFloat(sl.value);
    P[key] = transform ? transform(raw) : raw;
    if (vl) vl.textContent = Number.isInteger(raw) ? raw : raw.toFixed(1);
    action();
  });
}

wire('sCount',     'vCount',     'count',     regenAll);
wire('sSpread',    'vSpread',    'spread',    regenAll);
wire('sDensity',   'vDensity',   'density',   regenAll);
wire('sThresh',    'vThresh',    'threshold', regenAll, v => v / 100);
wire('sMaxDist',   'vMaxDist',   'maxDist',   regenEdges);
wire('sDiagAmt',   'vDiagAmt',   'diagAmt',   regenEdges);
wire('sAccentPct', 'vAccentPct', 'accentPct', regenEdges);
wire('sComp',      'vComp',      'comp',      render);
wire('sTrace',     'vTrace',     'trace',     render);
wire('sPad',       'vPad',       'pad',       render);
wire('sBevel',     'vBevel',     'bevel',     render);

document.getElementById('btnInvert').addEventListener('click', function () {
  P.invert = !P.invert;
  this.textContent = P.invert ? 'Dark → Dense' : 'Bright → Dense';
  this.classList.toggle('on', P.invert);
  regenAll();
});

document.getElementById('sBgColor').addEventListener('input', function () {
  P.bgColor = this.value; render();
});

document.getElementById('sCompColor').addEventListener('input', function () {
  P.compColor = this.value; render();
});

document.getElementById('sAccent').addEventListener('input', function () {
  P.accent = this.value; render();
});

document.getElementById('sOpacity').addEventListener('input', function () {
  overlayAlpha = parseFloat(this.value);
  document.getElementById('vOpacity').textContent = overlayAlpha.toFixed(2);
  render();
});

document.querySelectorAll('.mbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    P.mode = btn.dataset.mode;
    regenEdges();
  });
});

document.getElementById('btnToggle').addEventListener('click', () => {
  showOverlay = !showOverlay;
  const btn  = document.getElementById('btnToggle');
  const opts = document.getElementById('overlay-opts');
  btn.textContent = showOverlay ? 'Hide Image' : 'Show Image';
  btn.classList.toggle('on', showOverlay);
  opts.style.display = showOverlay ? '' : 'none';
  svg.style.cursor = showOverlay ? 'grab' : 'default';
  render();
});

document.getElementById('btnReset').addEventListener('click', () => {
  imgTx = { x: 0, y: 0, scale: 1 };
  buildLumMap();
  regenAll();
});

const zone = document.getElementById('upload-zone');
const finp = document.getElementById('file-input');
zone.addEventListener('click',     ()  => finp.click());
finp.addEventListener('change',    e   => { if (e.target.files[0]) loadImageFile(e.target.files[0]); });
zone.addEventListener('dragover',  e   => { e.preventDefault(); zone.classList.add('over'); });
zone.addEventListener('dragleave', ()  => zone.classList.remove('over'));
zone.addEventListener('drop',      e   => {
  e.preventDefault(); zone.classList.remove('over');
  if (e.dataTransfer.files[0]) loadImageFile(e.dataTransfer.files[0]);
});

document.getElementById('btnRegen').addEventListener('click', regenAll);

// ── Export helpers ────────────────────────────────────────────────────────────

function serializedSVG() {
  // Clone so we can remove the live UI cursor style without mutating the display SVG
  const clone = svg.cloneNode(true);
  clone.removeAttribute('style');
  return new XMLSerializer().serializeToString(clone);
}

document.getElementById('btnExportSVG').addEventListener('click', () => {
  const blob = new Blob([serializedSVG()], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.download = `pcb-${Date.now()}.svg`;
  a.href = URL.createObjectURL(blob);
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
});

document.getElementById('btnExportPNG').addEventListener('click', () => {
  const svgStr = serializedSVG();
  const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const img  = new Image();
  img.onload = () => {
    const off = document.createElement('canvas');
    off.width = CW; off.height = CH;
    off.getContext('2d').drawImage(img, 0, 0, CW, CH);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = `pcb-${Date.now()}.png`;
    a.href = off.toDataURL('image/png');
    a.click();
  };
  img.onerror = () => URL.revokeObjectURL(url);
  img.src = url;
});

// ── Init ──────────────────────────────────────────────────────────────────────

regenAll();
</script>
</body>
