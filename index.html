<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Coding Tools — Jan S'heeren</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f2f2f2;
      --panel: #ffffff;
      --panel-hover: #f7f7f7;
      --stroke: #d9d9d9;
      --stroke-strong: #bcbcbc;
      --text: #111111;
      --text-soft: #6a6a6a;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
      --max-width: 1440px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .shell {
      width: min(var(--max-width), calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    .hero {
      margin-bottom: 24px;
      padding: 24px 28px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 0.95;
      font-weight: 700;
    }

    .lead {
      max-width: 760px;
      margin: 0;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.7;
    }

    .hero-bottom {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* Tab bar */
    .tabs {
      display: flex;
      gap: 6px;
    }

    .tab {
      padding: 7px 14px;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      background: transparent;
      color: var(--text-soft);
      font-family: inherit;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .tab:hover {
      border-color: var(--stroke-strong);
      color: var(--text);
    }

    .tab.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    .status {
      color: var(--text-soft);
      font-size: 12px;
      margin: 0;
    }

    /* Galleries */
    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }

    .gallery.hidden { display: none; }

    .tool-card {
      display: flex;
      flex-direction: column;
      grid-column: span 4;
      overflow: hidden;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-lg);
      background: var(--panel);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    a.tool-card:hover {
      transform: translateY(-3px);
      border-color: var(--stroke-strong);
      background: var(--panel-hover);
    }

    .thumb-wrap {
      aspect-ratio: 16 / 10;
      margin: 14px 14px 0;
      overflow: hidden;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      background: #ececec;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--text-soft);
      font-size: 12px;
      padding: 16px;
      text-align: center;
    }

    .card-body {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tool-name {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      font-weight: 500;
      color: var(--text);
    }

    .tool-meta {
      color: var(--text-soft);
      font-size: 11px;
      line-height: 1.4;
    }

    .plugin-badge {
      display: inline-block;
      padding: 4px 8px;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      font-size: 10px;
      color: var(--text-soft);
      margin-top: 2px;
      align-self: flex-start;
    }

    .footer-note {
      margin-top: 22px;
      padding: 14px 16px;
      border: 1px solid var(--stroke);
      border-radius: 18px;
      background: var(--panel);
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.7;
    }

    .hidden { display: none; }

    @media (max-width: 1100px) {
      .tool-card { grid-column: span 6; }
    }

    @media (max-width: 700px) {
      .shell {
        width: min(var(--max-width), calc(100% - 24px));
        padding-top: 18px;
      }

      .hero { padding: 20px; }
      .gallery { gap: 14px; }
      .tool-card { grid-column: span 12; }
      .thumb-wrap { margin: 12px 12px 0; }
      .card-body { padding: 14px 16px 16px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">Jan S'heeren</div>
      <h1>Creative Coding Tools</h1>
      <p class="lead">
        A live gallery of generators, scripts, image tools, typography tools, and visual experiments.
      </p>
      <div class="hero-bottom">
        <div class="tabs">
          <button class="tab active" data-tab="tools">Tools</button>
          <button class="tab" data-tab="plugins">Plugins + Scripts</button>
        </div>
        <p class="status" id="status">Loading…</p>
      </div>
    </section>

    <section class="gallery" id="gallery-tools"></section>
    <section class="gallery hidden" id="gallery-plugins"></section>

    <div class="footer-note" id="footer-note">
      To show a thumbnail, place a file named <strong>preview.png</strong> inside a tool folder.
      Every folder containing an <strong>index.html</strong> will be listed automatically.
    </div>
  </main>

  <script>
    const OWNER        = "sheerenj";
    const REPO         = "CC-TY";
    const SITE_BASE    = `https://${OWNER}.github.io/${REPO}/tools`;
    const PLUGIN_BASE  = `https://${OWNER}.github.io/${REPO}/plugins`;
    const MANIFEST     = `https://${OWNER}.github.io/${REPO}/tools.json`;
    const PLUG_MANIFEST= `https://${OWNER}.github.io/${REPO}/plugins.json`;

    const galleryTools   = document.getElementById("gallery-tools");
    const galleryPlugins = document.getElementById("gallery-plugins");
    const statusEl       = document.getElementById("status");

    function prettifyName(slug) {
      return slug.replace(/[-_]+/g, " ").replace(/\s+/g, " ").trim();
    }

    function titleCase(str) {
      return str.replace(/\b\w/g, c => c.toUpperCase());
    }

    function thumbHtml(hasPreview, previewUrl, altText) {
      return `
        <div class="thumb-wrap">
          ${hasPreview
            ? `<img src="${previewUrl}" alt="${altText} preview"
                onerror="this.style.display='none';this.nextElementSibling.classList.remove('hidden');">`
            : ""}
          <div class="thumb-fallback ${hasPreview ? "hidden" : ""}">No Preview Yet</div>
        </div>`;
    }

    function makeToolCard({ category, slug, hasPreview }) {
      const link    = `${SITE_BASE}/${category}/${slug}/`;
      const preview = `${SITE_BASE}/${category}/${slug}/preview.png`;
      const name    = titleCase(prettifyName(slug));

      const card = document.createElement("a");
      card.className = "tool-card";
      card.href = link;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.innerHTML = `
        ${thumbHtml(hasPreview, preview, name)}
        <div class="card-body">
          <h2 class="tool-name">${name}</h2>
          <div class="tool-meta">${titleCase(prettifyName(category))}</div>
        </div>`;
      return card;
    }

    function makePluginCard({ slug, type, app, hasPreview, repoUrl, previewBase }) {
      const base    = previewBase || PLUGIN_BASE;
      const preview = `${base}/${slug}/preview.png`;
      const name    = titleCase(prettifyName(slug));
      const typeLabel = type === "script" ? "Script" : "Plugin";

      const card = document.createElement(repoUrl ? "a" : "div");
      card.className = "tool-card";
      if (repoUrl) {
        card.href   = repoUrl;
        card.target = "_blank";
        card.rel    = "noopener noreferrer";
      }
      card.innerHTML = `
        ${thumbHtml(hasPreview, preview, name)}
        <div class="card-body">
          <h2 class="tool-name">${name}</h2>
          <div class="tool-meta">${typeLabel}</div>
          ${app ? `<span class="plugin-badge">${app}</span>` : ""}
        </div>`;
      return card;
    }

    async function loadAll() {
      const [toolsRes, pluginsRes] = await Promise.allSettled([
        fetch(MANIFEST),
        fetch(PLUG_MANIFEST),
      ]);

      let toolCount = 0, pluginCount = 0;

      if (toolsRes.status === "fulfilled" && toolsRes.value.ok) {
        const tools = await toolsRes.value.json();
        tools.forEach(t => galleryTools.appendChild(makeToolCard(t)));
        toolCount = tools.length;
      }

      if (pluginsRes.status === "fulfilled" && pluginsRes.value.ok) {
        const plugins = await pluginsRes.value.json();
        plugins.forEach(p => galleryPlugins.appendChild(makePluginCard(p)));
        pluginCount = plugins.length;
      }

      statusEl.textContent = `${toolCount} tools · ${pluginCount} plugin${pluginCount !== 1 ? "s" : ""}`;
    }

    // Tab switching
    const tabs = document.querySelectorAll(".tab");
    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        const target = tab.dataset.tab;
        galleryTools.classList.toggle("hidden", target !== "tools");
        galleryPlugins.classList.toggle("hidden", target !== "plugins");
      });
    });

    loadAll();
  </script>
</body>
</html>
