<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 240px; height: 100%;
  overflow: hidden;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 11px;
  color: #333;
  background: #fff;
  -webkit-font-smoothing: antialiased;
}
body { display: flex; flex-direction: column; }

/* ── Preview ── */
#preview {
  width: 100%; height: 135px;
  background: #1e1e1e;
  flex-shrink: 0;
  position: relative;
  cursor: grab;
  overflow: hidden;
}
#preview:active { cursor: grabbing; }
#pc { display: block; }
#ctx-badge {
  position: absolute; bottom: 6px; right: 8px;
  font-size: 9px; color: rgba(255,255,255,0.28);
  letter-spacing: 0.06em; text-transform: uppercase;
  pointer-events: none; opacity: 0; transition: opacity 0.15s;
}
#ctx-badge.show { opacity: 1; }

/* ── Insert button ── */
#insert-wrap {
  flex-shrink: 0;
  padding: 8px;
  border-bottom: 1px solid #e5e5e5;
}
#binsert {
  width: 100%; height: 30px;
  background: #18a0fb; color: #fff;
  border: none; border-radius: 6px;
  font-family: inherit; font-size: 11px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.01em;
  transition: opacity 0.1s;
}
#binsert:hover:not(:disabled) { opacity: 0.88; }
#binsert:disabled { opacity: 0.45; cursor: not-allowed; }

/* ── Scrollable controls ── */
#controls {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding-bottom: 16px;
}
#controls::-webkit-scrollbar { width: 3px; }
#controls::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* ── Section label ── */
.sec {
  padding: 10px 8px 2px;
  font-size: 10px; font-weight: 600;
  color: #b3b3b3;
  text-transform: uppercase; letter-spacing: 0.07em;
}

/* ── Generic row (label + slider + value) ── */
.row {
  display: flex; align-items: center;
  height: 28px; padding: 0 8px; gap: 6px;
}
.lbl {
  width: 52px; flex-shrink: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: #333;
}
.val {
  width: 32px; flex-shrink: 0; text-align: right;
  color: #999; font-family: ui-monospace, "SF Mono", monospace; font-size: 10px;
}

/* ── Toggle row ── */
.row-tog {
  display: flex; align-items: center;
  height: 28px; padding: 0 8px;
  justify-content: space-between;
}

/* ── Sliders ── */
input[type=range] {
  -webkit-appearance: none; appearance: none;
  flex: 1; height: 2px;
  background: #e5e5e5; border-radius: 1px;
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px; border-radius: 50%;
  background: #333; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 10px; height: 10px; border-radius: 50%;
  background: #333; cursor: pointer; border: none;
}

/* ── Toggle switch ── */
.tog { position: relative; width: 28px; height: 16px; flex-shrink: 0; }
.tog input { opacity: 0; width: 0; height: 0; position: absolute; }
.tog-tr {
  position: absolute; inset: 0;
  background: #e5e5e5; border-radius: 8px;
  cursor: pointer; transition: background 0.12s;
}
.tog-tr::before {
  content: ''; position: absolute;
  width: 12px; height: 12px; left: 2px; top: 2px;
  background: #fff; border-radius: 50%;
  transition: transform 0.12s;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.12);
}
.tog input:checked ~ .tog-tr { background: #18a0fb; }
.tog input:checked ~ .tog-tr::before { transform: translateX(12px); }

/* ── Colour swatch (small, beside slider) ── */
.sw {
  width: 24px; height: 18px; flex-shrink: 0;
  border-radius: 3px; border: 1px solid #e5e5e5;
  overflow: hidden; position: relative; cursor: pointer;
}
.sw input[type=color] {
  position: absolute; inset: -3px;
  width: calc(100% + 6px); height: calc(100% + 6px);
  border: none; padding: 0; cursor: pointer;
}

/* ── Full-width colour swatch ── */
.sw-full {
  flex: 1; height: 20px;
  border-radius: 3px; border: 1px solid #e5e5e5;
  overflow: hidden; position: relative; cursor: pointer;
}
.sw-full input[type=color] {
  position: absolute; inset: -3px;
  width: calc(100% + 6px); height: calc(100% + 6px);
  border: none; padding: 0; cursor: pointer;
}

/* ── Select ── */
select {
  flex: 1; height: 24px;
  border: 1px solid #e5e5e5; border-radius: 3px;
  background: #fff; color: #333;
  font-family: inherit; font-size: 11px;
  padding: 0 18px 0 6px; outline: none; cursor: pointer;
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='4'><path d='M0 0l4 4 4-4' fill='none' stroke='%23999' stroke-width='1.2'/></svg>");
  background-repeat: no-repeat; background-position: right 6px center;
}

/* ── Ghost button ── */
.btn-ghost {
  flex: 1; height: 26px;
  background: #fff; color: #333;
  border: 1px solid #e5e5e5; border-radius: 4px;
  font-family: inherit; font-size: 11px;
  cursor: pointer; transition: background 0.1s;
}
.btn-ghost:hover { background: #f5f5f5; }

/* ── Small button ── */
.btn-sm {
  height: 24px; padding: 0 10px;
  background: #fff; color: #333;
  border: 1px solid #e5e5e5; border-radius: 4px;
  font-family: inherit; font-size: 11px;
  cursor: pointer; flex-shrink: 0;
}
.btn-sm:hover { background: #f5f5f5; }

/* ── Separator ── */
.sep { height: 1px; background: #f0f0f0; margin: 4px 0; }
</style>
</head>
<body>

<div id="preview">
  <canvas id="pc"></canvas>
  <div id="ctx-badge">Editing</div>
</div>

<div id="insert-wrap">
  <button id="binsert">↑ Insert SVG</button>
</div>

<div id="controls">

  <div class="sec">Lattice</div>
  <div class="row">
    <span class="lbl">Cells</span>
    <input type="range" id="rn" min="1" max="8" value="2" step="1">
    <span class="val" id="vn">2</span>
  </div>
  <div class="row">
    <span class="lbl">Atom size</span>
    <input type="range" id="rsz" min="1" max="72" value="44">
    <span class="val" id="vsz">44%</span>
  </div>
  <div class="row-tog">
    <span>Show atoms</span>
    <label class="tog"><input type="checkbox" id="tshowAtoms" checked><span class="tog-tr"></span></label>
  </div>
  <div class="row-tog">
    <span>Merged shape</span>
    <label class="tog"><input type="checkbox" id="tmerged"><span class="tog-tr"></span></label>
  </div>

  <div class="sep"></div>
  <div class="sec">Appearance</div>
  <div class="row">
    <span class="lbl">Fill</span>
    <div class="sw-full"><input type="color" id="cac" value="#9e9e9e"></div>
  </div>
  <div class="row">
    <span class="lbl">Stroke</span>
    <div class="sw"><input type="color" id="csc" value="#bfb9ab"></div>
    <input type="range" id="rsw" min="0" max="120" value="0">
    <span class="val" id="vsw">0px</span>
  </div>

  <div class="sep"></div>
  <div class="sec">Bonds</div>
  <div class="row-tog">
    <span>Show bonds</span>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="sw"><input type="color" id="cbc" value="#bfb9ab"></div>
      <label class="tog"><input type="checkbox" id="tsb"><span class="tog-tr"></span></label>
    </div>
  </div>
  <div class="row">
    <span class="lbl">Opacity</span>
    <input type="range" id="rbo" min="0" max="100" value="100">
    <span class="val" id="vbo">100%</span>
  </div>
  <div class="row">
    <span class="lbl">Width</span>
    <input type="range" id="rbw" min="1" max="80" value="10">
    <span class="val" id="vbw">1.0px</span>
  </div>

  <div class="sep"></div>
  <div class="sec">Background</div>
  <div class="row">
    <span class="lbl">Color</span>
    <div class="sw-full"><input type="color" id="cbg" value="#000000"></div>
  </div>

  <div class="sep"></div>
  <div class="sec">Canvas</div>
  <div class="row">
    <span class="lbl">Size</span>
    <select id="cvsize">
      <option value="1920x1080" selected>HD — 1920 × 1080</option>
      <option value="1080x1920">9:16 — 1080 × 1920</option>
      <option value="1080x1080">1:1 — 1080 × 1080</option>
      <option value="2560x1440">2K — 2560 × 1440</option>
    </select>
  </div>

  <div class="sep"></div>
  <div class="sec">Rotation</div>
  <div class="row">
    <span class="lbl">X</span>
    <input type="range" id="rrx" min="-180" max="180" value="35">
    <span class="val" id="vrx">35°</span>
  </div>
  <div class="row">
    <span class="lbl">Y</span>
    <input type="range" id="rry" min="-180" max="180" value="45">
    <span class="val" id="vry">45°</span>
  </div>
  <div class="row">
    <span class="lbl">Z</span>
    <input type="range" id="rrz" min="-180" max="180" value="0">
    <span class="val" id="vrz">0°</span>
  </div>
  <div class="row">
    <span class="lbl">Zoom</span>
    <input type="range" id="rzoom" min="3" max="35" value="10">
    <span class="val" id="vzoom">1.0×</span>
  </div>
  <div class="row" style="gap:8px;margin-top:2px">
    <button class="btn-sm" id="breset">↺ Reset</button>
    <span style="flex:1;text-align:right;color:#b3b3b3;font-size:10px">Drag · scroll to zoom</span>
  </div>

  <div class="sep"></div>
  <div class="sec">SVG</div>
  <div class="row-tog">
    <span>Transparent bg</span>
    <label class="tog"><input type="checkbox" id="tealpha" checked><span class="tog-tr"></span></label>
  </div>
  <div class="row-tog">
    <span>Merge to shape</span>
    <label class="tog"><input type="checkbox" id="tsvgmerge"><span class="tog-tr"></span></label>
  </div>
  <div class="row" style="padding-top:4px">
    <button class="btn-ghost" id="bsvg">↓ Download SVG</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/polygon-clipping@0.15.7/dist/polygon-clipping.umd.min.js"></script>
<script>
'use strict';

const DPR = Math.min(window.devicePixelRatio || 1, 2);
const cv  = document.getElementById('pc');
const ctx = cv.getContext('2d');
const ca  = document.getElementById('preview');

// ── State ──────────────────────────────────────────────────────────────────
const S = {
  n: 2, szF: .44, ac: '#9e9e9e', showAtoms: true,
  merged: false,
  cW: 1920, cH: 1080,
  sw: 0, sc: '#bfb9ab',
  sb: false, bc: '#bfb9ab', bo: 1.0, bw: 1.0,
  bg: '#000000',
  rx: .6155, ry: .7854, rz: 0, zoom: 1.0,
  expAlpha: true, svgMerge: false
};

// ── Figma context ──────────────────────────────────────────────────────────
let currentNodeId = null;

function setNodeContext(nodeId) {
  currentNodeId = nodeId;
  const btn = document.getElementById('binsert');
  btn.textContent = nodeId ? '↑ Update Selected' : '↑ Insert SVG';
  btn.disabled = false;
  document.getElementById('ctx-badge').classList.toggle('show', !!nodeId);
}

// ── Offscreen canvases (merged stroke compositing) ─────────────────────────
let offA = null, offB = null, offW = 0, offH = 0;
function ensureOff(w, h) {
  if (offW === w && offH === h) return;
  offA = Object.assign(document.createElement('canvas'), { width: w, height: h });
  offB = Object.assign(document.createElement('canvas'), { width: w, height: h });
  offW = w; offH = h;
}

// ── FCC lattice ────────────────────────────────────────────────────────────
let pts = [], bonds = [];
function genFCC(n) {
  const m = new Map(), r = [];
  const add = (x, y, z) => {
    const k = `${Math.round(x*100)},${Math.round(y*100)},${Math.round(z*100)}`;
    if (!m.has(k)) { m.set(k, 1); r.push([x-n/2, y-n/2, z-n/2]); }
  };
  for (let ix=0; ix<n; ix++) for (let iy=0; iy<n; iy++) for (let iz=0; iz<n; iz++) {
    for (let a=0; a<=1; a++) for (let b=0; b<=1; b++) for (let c=0; c<=1; c++) add(ix+a, iy+b, iz+c);
    add(ix+.5,iy+.5,iz); add(ix+.5,iy+.5,iz+1);
    add(ix+.5,iy,iz+.5); add(ix+.5,iy+1,iz+.5);
    add(ix,iy+.5,iz+.5); add(ix+1,iy+.5,iz+.5);
  }
  return r;
}
function rebuild() {
  pts = genFCC(S.n); bonds = [];
  for (let i=0; i<pts.length; i++) for (let j=i+1; j<pts.length; j++) {
    const dx=pts[i][0]-pts[j][0], dy=pts[i][1]-pts[j][1], dz=pts[i][2]-pts[j][2];
    if (Math.sqrt(dx*dx+dy*dy+dz*dz) < .76) bonds.push([i,j]);
  }
}

// ── Math ───────────────────────────────────────────────────────────────────
function rot3(p, rx, ry, rz) {
  const [x, y, z] = p;
  const x1 = x*Math.cos(ry)+z*Math.sin(ry), z1 = -x*Math.sin(ry)+z*Math.cos(ry);
  const y2 = y*Math.cos(rx)-z1*Math.sin(rx), z2 = y*Math.sin(rx)+z1*Math.cos(rx);
  return [x1*Math.cos(rz)-y2*Math.sin(rz), x1*Math.sin(rz)+y2*Math.cos(rz), z2];
}
function hexRGB(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

// ── Atom positions ─────────────────────────────────────────────────────────
function getAtoms(W, H) {
  const bsc = Math.min(W, H) / (S.n * 2.55) * S.zoom;
  const ar  = bsc * S.szF;
  const cx = W/2, cy = H/2;
  const atoms = pts.map(p => {
    const [x,y,z] = rot3(p, S.rx, S.ry, S.rz);
    return { sx: cx+x*bsc, sy: cy-y*bsc, sz: z };
  });
  return { atoms, ar };
}
function fillCircles(c, atoms, r, color) {
  c.fillStyle = color;
  for (const { sx, sy } of atoms) { c.beginPath(); c.arc(sx, sy, r, 0, Math.PI*2); c.fill(); }
}

// ── Draw ───────────────────────────────────────────────────────────────────
function drawScene(tCtx, transparent, dpr) {
  if (dpr === undefined) dpr = DPR;
  const pw = tCtx.canvas.width, ph = tCtx.canvas.height;
  const W = pw/dpr, H = ph/dpr;
  const { atoms, ar } = getAtoms(W, H);
  const atomsP = atoms.map(({ sx, sy, sz }) => ({ sx: sx*dpr, sy: sy*dpr, sz }));
  const arP = ar * dpr;

  tCtx.save();
  tCtx.scale(dpr, dpr);

  if (transparent) tCtx.clearRect(0, 0, W, H);
  else { tCtx.fillStyle = S.bg; tCtx.fillRect(0, 0, W, H); }

  if (S.sb && bonds.length) {
    tCtx.save();
    tCtx.globalAlpha = S.bo; tCtx.strokeStyle = S.bc; tCtx.lineWidth = S.bw; tCtx.lineCap = 'round';
    for (const [i, j] of bonds) {
      tCtx.beginPath(); tCtx.moveTo(atoms[i].sx, atoms[i].sy);
      tCtx.lineTo(atoms[j].sx, atoms[j].sy); tCtx.stroke();
    }
    tCtx.restore();
  }

  if (S.showAtoms && S.merged) {
    ensureOff(pw, ph);
    const cA = offA.getContext('2d'), cB = offB.getContext('2d');
    if (S.sw > 0) {
      cB.clearRect(0, 0, pw, ph);
      fillCircles(cB, atomsP, arP + S.sw * dpr, S.sc);
      cB.globalCompositeOperation = 'destination-out';
      fillCircles(cB, atomsP, arP, '#000');
      cB.globalCompositeOperation = 'source-over';
      tCtx.drawImage(offB, 0, 0, W, H);
    }
    cA.clearRect(0, 0, pw, ph);
    fillCircles(cA, atomsP, arP, S.ac);
    tCtx.drawImage(offA, 0, 0, W, H);
  } else if (S.showAtoms) {
    const sorted = [...atoms].sort((a, b) => a.sz - b.sz);
    for (const { sx, sy } of sorted) {
      if (S.sw > 0) { tCtx.beginPath(); tCtx.arc(sx, sy, ar+S.sw, 0, Math.PI*2); tCtx.fillStyle=S.sc; tCtx.fill(); }
      tCtx.beginPath(); tCtx.arc(sx, sy, ar, 0, Math.PI*2); tCtx.fillStyle=S.ac; tCtx.fill();
    }
  }

  tCtx.restore();
}

// ── SVG builder ────────────────────────────────────────────────────────────
function buildSVGString() {
  const W = S.cW, H = S.cH;
  const { atoms, ar } = getAtoms(W, H);
  const sorted = [...atoms].sort((a, b) => a.sz - b.sz);
  const f2 = n => n.toFixed(2);
  let body = '';

  if (!S.expAlpha) body += `<rect width="${W}" height="${H}" fill="${S.bg}"/>`;

  if (S.sb && bonds.length) {
    const [r, g, b] = hexRGB(S.bc);
    body += `<g opacity="${S.bo.toFixed(2)}" stroke="rgb(${r},${g},${b})" stroke-width="${S.bw}" stroke-linecap="round" fill="none">`;
    for (const [i, j] of bonds)
      body += `<line x1="${f2(atoms[i].sx)}" y1="${f2(atoms[i].sy)}" x2="${f2(atoms[j].sx)}" y2="${f2(atoms[j].sy)}"/>`;
    body += '</g>';
  }

  if (S.svgMerge && window.polygonClipping) {
    const SEG = 72;
    const circRing = (cx, cy, r) => {
      const p = [];
      for (let i=0; i<SEG; i++) { const a=(i/SEG)*Math.PI*2; p.push([cx+r*Math.cos(a), cy+r*Math.sin(a)]); }
      return p;
    };
    const toGeom = (cx, cy, r) => [[circRing(cx, cy, r)]];
    const mpToD  = mp => mp.flatMap(poly =>
      poly.map(ring => ring.map((p, i) => (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+' Z')
    ).join(' ');
    const fillGeoms = sorted.map(({ sx, sy }) => toGeom(sx, sy, ar));
    const fillUnion = polygonClipping.union(...fillGeoms);
    const fillD     = mpToD(fillUnion);
    if (S.sw > 0) {
      const outerGeoms  = sorted.map(({ sx, sy }) => toGeom(sx, sy, ar+S.sw));
      const strokeUnion = polygonClipping.difference(polygonClipping.union(...outerGeoms), fillUnion);
      body += `<path d="${mpToD(strokeUnion)}" fill="${S.sc}" fill-rule="nonzero"/>`;
    }
    body += `<path d="${fillD}" fill="${S.ac}" fill-rule="nonzero"/>`;
  } else if (S.merged) {
    if (S.sw > 0)
      body += `<g fill="${S.sc}">${sorted.map(({ sx, sy }) => `<circle cx="${f2(sx)}" cy="${f2(sy)}" r="${f2(ar+S.sw)}"/>`).join('')}</g>`;
    body += `<g fill="${S.ac}">${sorted.map(({ sx, sy }) => `<circle cx="${f2(sx)}" cy="${f2(sy)}" r="${f2(ar)}"/>`).join('')}</g>`;
  } else {
    for (const { sx, sy } of sorted) {
      if (S.sw > 0) body += `<circle cx="${f2(sx)}" cy="${f2(sy)}" r="${f2(ar+S.sw)}" fill="${S.sc}"/>`;
      body += `<circle cx="${f2(sx)}" cy="${f2(sy)}" r="${f2(ar)}" fill="${S.ac}"/>`;
    }
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">\n  ${body}\n</svg>`;
}

// ── Rotation slider sync ───────────────────────────────────────────────────
function radToDeg(r) {
  let d = r * 180 / Math.PI;
  return Math.round(((d % 360) + 540) % 360 - 180);
}
function syncRotSliders() {
  const $ = id => document.getElementById(id);
  const dx = radToDeg(S.rx), dy = radToDeg(S.ry), dz = radToDeg(S.rz);
  $('rrx').value = dx; $('vrx').textContent = dx + '°';
  $('rry').value = dy; $('vry').textContent = dy + '°';
  $('rrz').value = dz; $('vrz').textContent = dz + '°';
  $('rzoom').value = Math.round(S.zoom * 10);
  $('vzoom').textContent = S.zoom.toFixed(1) + '×';
}

// ── State round-trip ───────────────────────────────────────────────────────
function serializeState() {
  return JSON.stringify({
    n: S.n, szF: S.szF, ac: S.ac, showAtoms: S.showAtoms,
    merged: S.merged, cW: S.cW, cH: S.cH,
    sw: S.sw, sc: S.sc, sb: S.sb, bc: S.bc, bo: S.bo, bw: S.bw,
    bg: S.bg, rx: S.rx, ry: S.ry, rz: S.rz, zoom: S.zoom,
    expAlpha: S.expAlpha, svgMerge: S.svgMerge
  });
}

function loadState(state) {
  Object.assign(S, state);
  rebuild();
  syncAllControls();
}

function syncAllControls() {
  const $ = id => document.getElementById(id);
  $('rn').value = S.n;                             $('vn').textContent = S.n;
  $('rsz').value = Math.round(S.szF*100);          $('vsz').textContent = Math.round(S.szF*100)+'%';
  $('cac').value = S.ac;
  $('tshowAtoms').checked = S.showAtoms;
  $('tmerged').checked = S.merged;
  $('rsw').value = Math.round(S.sw);               $('vsw').textContent = Math.round(S.sw)+'px';
  $('csc').value = S.sc;
  $('tsb').checked = S.sb;
  $('cbc').value = S.bc;
  $('rbo').value = Math.round(S.bo*100);           $('vbo').textContent = Math.round(S.bo*100)+'%';
  $('rbw').value = Math.round(S.bw*10);            $('vbw').textContent = S.bw.toFixed(1)+'px';
  $('cbg').value = S.bg;
  $('tealpha').checked = S.expAlpha;
  $('tsvgmerge').checked = S.svgMerge;
  const key = `${S.cW}x${S.cH}`;
  const opt = $('cvsize').querySelector(`option[value="${key}"]`);
  if (opt) $('cvsize').value = key;
  syncRotSliders();
  resize();
}

// ── Figma messages ─────────────────────────────────────────────────────────
function insertSVGToFigma() {
  const btn = document.getElementById('binsert');
  btn.textContent = '↑ Inserting…'; btn.disabled = true;
  parent.postMessage({
    pluginMessage: { type: 'INSERT_SVG', svgString: buildSVGString(), state: serializeState(), nodeId: currentNodeId }
  }, '*');
}

window.addEventListener('message', e => {
  const msg = e.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'LOAD_STATE') {
    loadState(msg.state);
    setNodeContext(msg.nodeId);
  } else if (msg.type === 'SELECTION_CLEARED') {
    setNodeContext(null);
  } else if (msg.type === 'INSERT_DONE') {
    setNodeContext(msg.nodeId);
    const btn = document.getElementById('binsert');
    btn.textContent = '✓ Done';
    setTimeout(() => setNodeContext(msg.nodeId), 1200);
  }
});

// ── Drag orbit ─────────────────────────────────────────────────────────────
const drag = { on: false, x: 0, y: 0 };
ca.addEventListener('mousedown',  e => { drag.on=true; drag.x=e.clientX; drag.y=e.clientY; });
ca.addEventListener('touchstart', e => { const t=e.touches[0]; drag.on=true; drag.x=t.clientX; drag.y=t.clientY; }, { passive:true });
window.addEventListener('mousemove', e => {
  if (!drag.on) return;
  S.ry += (e.clientX - drag.x) * .005;
  S.rx += (e.clientY - drag.y) * .005;
  drag.x = e.clientX; drag.y = e.clientY;
  syncRotSliders();
});
ca.addEventListener('touchmove', e => {
  if (!drag.on) return;
  const t = e.touches[0];
  S.ry += (t.clientX-drag.x)*.005; S.rx += (t.clientY-drag.y)*.005;
  drag.x=t.clientX; drag.y=t.clientY;
  syncRotSliders(); e.preventDefault();
}, { passive:false });
window.addEventListener('mouseup',  () => drag.on = false);
window.addEventListener('touchend', () => drag.on = false);
ca.addEventListener('wheel', e => {
  S.zoom = Math.max(.3, Math.min(3.5, S.zoom - e.deltaY * .001));
  syncRotSliders();
}, { passive:true });

// ── Resize ─────────────────────────────────────────────────────────────────
function resize() {
  const aW = ca.clientWidth, aH = ca.clientHeight;
  const scale = Math.min(aW / S.cW, aH / S.cH);
  const dW = Math.round(S.cW * scale), dH = Math.round(S.cH * scale);
  cv.width = Math.round(dW * DPR); cv.height = Math.round(dH * DPR);
  cv.style.width = dW + 'px'; cv.style.height = dH + 'px';
  offW = 0; offH = 0;
}
window.addEventListener('resize', resize);

// ── Render loop ────────────────────────────────────────────────────────────
function tick() { requestAnimationFrame(tick); drawScene(ctx, false); }

// ── UI wiring ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

$('rn').oninput  = function() { S.n=+this.value;         $('vn').textContent=S.n; rebuild(); };
$('rsz').oninput = function() { S.szF=+this.value/100;   $('vsz').textContent=this.value+'%'; };
$('cac').oninput = function() { S.ac=this.value; };
$('tshowAtoms').onchange = function() { S.showAtoms=this.checked; };
$('tmerged').onchange    = function() {
  S.merged=this.checked;
  if (this.checked) { S.svgMerge=true; $('tsvgmerge').checked=true; }
};
$('rsw').oninput = function() { S.sw=+this.value;        $('vsw').textContent=this.value+'px'; };
$('csc').oninput = function() { S.sc=this.value; };
$('tsb').onchange = function() { S.sb=this.checked; };
$('cbc').oninput  = function() { S.bc=this.value; };
$('rbo').oninput  = function() { S.bo=+this.value/100;   $('vbo').textContent=this.value+'%'; };
$('rbw').oninput  = function() { S.bw=+this.value/10;    $('vbw').textContent=S.bw.toFixed(1)+'px'; };
$('cbg').oninput  = function() { S.bg=this.value; };

$('cvsize').onchange = function() {
  const [w, h] = this.value.split('x').map(Number);
  S.cW=w; S.cH=h; resize();
};

$('rrx').oninput   = function() { S.rx=+this.value*Math.PI/180; $('vrx').textContent=this.value+'°'; };
$('rry').oninput   = function() { S.ry=+this.value*Math.PI/180; $('vry').textContent=this.value+'°'; };
$('rrz').oninput   = function() { S.rz=+this.value*Math.PI/180; $('vrz').textContent=this.value+'°'; };
$('rzoom').oninput = function() { S.zoom=+this.value/10;         $('vzoom').textContent=S.zoom.toFixed(1)+'×'; };

$('tealpha').onchange   = function() { S.expAlpha=this.checked; };
$('tsvgmerge').onchange = function() { S.svgMerge=this.checked; };

$('binsert').onclick = () => insertSVGToFigma();

$('breset').onclick = () => { S.rx=.6155; S.ry=.7854; S.rz=0; S.zoom=1.0; syncRotSliders(); };

$('bsvg').onclick = () => {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([buildSVGString()], { type: 'image/svg+xml;charset=utf-8' }));
  a.download = `PLT_Crystal_${new Date().toISOString().slice(0,16).replace(/[-T:]/g,'')}.svg`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
};

// ── Boot ───────────────────────────────────────────────────────────────────
rebuild();
resize();
tick();
</script>
</body>
</html>
