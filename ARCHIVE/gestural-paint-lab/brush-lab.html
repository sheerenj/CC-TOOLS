<canvas id="c" width="1600" height="560"></canvas>
<script>
// ---------- Brush Lab: single-stroke bristle engine ----------
const PARAMS = {
  seed: 7,
  W: 1600, H: 560,
  bg: '#f1ece0',
  bristles: 50,
  brushWidth: 98,    // px across the flat brush
  tip: 4.7,           // bristle thickness
  spacing: 1.5,       // px between stamps along the path
  flow: 0.6,          // per-dab base alpha
  deplete: 1.22,      // reservoir over stroke
  loadVar: 0.4,       // per-bristle variation in starting load
  grainStrength: 1.0, // how strongly canvas tooth breaks up dry areas
  splay: 1.35,        // fan-out at lift-off
  color: '#b5342a',   // brick red, like the refs
  hueJitter: 10,      // deg
  satJitter: 0.10,
  valJitter: 0.14,
};

// ---------- utils ----------
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const smooth=(e0,e1,x)=>{const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*(3-2*t);};
const clamp01=x=>Math.max(0,Math.min(1,x));
const lerp=(a,b,t)=>a+(b-a)*t;
const TAU=Math.PI*2;

function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);
    switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;}
  return [h*360,s,l];
}
const hsl=(h,s,l)=>`hsl(${((h%360)+360)%360} ${Math.round(clamp01(s)*100)}% ${Math.round(clamp01(l)*100)}%)`;

// ---------- value-noise grain (canvas-registered tooth) ----------
function noiseLayer(W,H,cell,rng){
  const gw=Math.ceil(W/cell)+2, gh=Math.ceil(H/cell)+2;
  const grid=new Float32Array(gw*gh);
  for(let i=0;i<grid.length;i++)grid[i]=rng();
  const out=new Float32Array(W*H);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const fx=x/cell, fy=y/cell, ix=Math.floor(fx), iy=Math.floor(fy);
    const tx=fx-ix, ty=fy-iy, u=tx*tx*(3-2*tx), v=ty*ty*(3-2*ty);
    const a=grid[iy*gw+ix],b=grid[iy*gw+ix+1],c=grid[(iy+1)*gw+ix],d=grid[(iy+1)*gw+ix+1];
    out[y*W+x]=lerp(lerp(a,b,u),lerp(c,d,u),v);
  }
  return out;
}
function buildGrain(W,H,rng){
  const o1=noiseLayer(W,H,5,rng), o2=noiseLayer(W,H,13,rng), o3=noiseLayer(W,H,34,rng);
  const g=new Float32Array(W*H);let mn=1e9,mx=-1e9;
  for(let i=0;i<g.length;i++){const v=o1[i]*0.55+o2[i]*0.30+o3[i]*0.15;g[i]=v;if(v<mn)mn=v;if(v>mx)mx=v;}
  for(let i=0;i<g.length;i++)g[i]=(g[i]-mn)/(mx-mn);
  return g;
}

// ---------- soft round bristle tip (pre-tinted hsl) ----------
function makeTip(r,h,s,l){
  const H_=((h%360)+360)%360, S_=Math.round(Math.max(0,Math.min(100,s))), L_=Math.round(Math.max(0,Math.min(100,l)));
  const sz=Math.ceil(r*2)+2, cv=document.createElement('canvas');cv.width=cv.height=sz;
  const x=cv.getContext('2d'),g=x.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,r);
  g.addColorStop(0,`hsla(${H_} ${S_}% ${L_}% / 1)`);
  g.addColorStop(0.55,`hsla(${H_} ${S_}% ${L_}% / 0.85)`);
  g.addColorStop(1,`hsla(${H_} ${S_}% ${L_}% / 0)`);
  x.fillStyle=g;x.fillRect(0,0,sz,sz);return cv;
}

// ---------- path: catmull-rom through control points ----------
function catmull(pts,samples){
  const out=[];const P=[pts[0],...pts,pts[pts.length-1]];
  for(let i=0;i<P.length-3;i++){
    const[p0,p1,p2,p3]=[P[i],P[i+1],P[i+2],P[i+3]];
    for(let j=0;j<samples;j++){const t=j/samples,t2=t*t,t3=t2*t;
      out.push({
        x:0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        y:0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
      });}
  }
  return out;
}

function pressureAt(t){
  const attack=smooth(0,0.09,t);
  const release=1-smooth(0.62,1.0,t);
  let p=Math.min(attack,release);
  return p;
}

function drawStroke(ctx,grain,P,ctrlPts,baseColorHex){
  const W=P.W,H=P.H;
  const rng=mulberry32(P.seed*2654435761>>>0);
  // dense polyline + cumulative arc length
  const poly=catmull(ctrlPts,40);
  const cum=[0];for(let i=1;i<poly.length;i++){const dx=poly[i].x-poly[i-1].x,dy=poly[i].y-poly[i-1].y;cum.push(cum[i-1]+Math.hypot(dx,dy));}
  const total=cum[cum.length-1];
  // stations every `spacing` px
  const stations=[];
  let si=0;
  for(let s=0;s<=total;s+=P.spacing){
    while(si<cum.length-2&&cum[si+1]<s)si++;
    const seg=(s-cum[si])/Math.max(1e-3,(cum[si+1]-cum[si]));
    const a=poly[si],b=poly[Math.min(si+1,poly.length-1)];
    const x=lerp(a.x,b.x,seg),y=lerp(a.y,b.y,seg);
    let tx=b.x-a.x,ty=b.y-a.y;const tl=Math.hypot(tx,ty)||1;tx/=tl;ty/=tl;
    const nx=-ty,ny=tx;const t=s/total;
    const press=pressureAt(t);
    const w=P.brushWidth*(0.22+0.78*press);
    stations.push({x,y,nx,ny,t,press,w});
  }

  const [bh,bs,bl]=hexToHsl(baseColorHex);
  const HH=((bh%360)+360)%360;
  const baseCss=`hsl(${HH} ${Math.round(clamp01(bs)*100)}% ${Math.round(clamp01(bl)*100)}%)`;
  const mottle=P.mottle!=null?P.mottle:1;
  const edgeRough=P.edgeRough!=null?P.edgeRough:0.85;
  const tailDry=P.tailDry!=null?P.tailDry:0.95;
  const bodyTex=P.bodyTexture!=null?P.bodyTexture:0.16;

  // stroke gets its own layer so we can carve into it, then composite
  const sl=document.createElement('canvas');sl.width=W;sl.height=H;const sx=sl.getContext('2d');
  if(stations.length<2){return;}

  // --- 1. SOLID tapered ribbon body ---
  const Le=[],Re=[];
  for(const st of stations){const h2=st.w*0.5;Le.push([st.x+st.nx*h2,st.y+st.ny*h2]);Re.push([st.x-st.nx*h2,st.y-st.ny*h2]);}
  sx.beginPath();sx.moveTo(Le[0][0],Le[0][1]);
  for(let i=1;i<Le.length;i++)sx.lineTo(Le[i][0],Le[i][1]);
  for(let i=Re.length-1;i>=0;i--)sx.lineTo(Re[i][0],Re[i][1]);
  sx.closePath();
  sx.fillStyle=baseCss;sx.fill();

  // --- 2. internal mottle (painterly colour variation), clipped to body ---
  sx.save();sx.clip();
  for(let m=0;m<Math.round(12*mottle);m++){
    const st=stations[(rng()*stations.length)|0];
    const r=st.w*(0.45+rng()*1.1);
    const dl=(rng()-0.5)*2*0.16;
    const tip=makeTip(r, bh+(rng()-0.5)*P.hueJitter*1.4, (bs+(rng()-0.5)*0.06)*100, (bl*(1+dl))*100);
    sx.globalAlpha=0.08+rng()*0.16;
    sx.drawImage(tip, st.x+(rng()-0.5)*st.w-r, st.y+(rng()-0.5)*st.w-r, r*2, r*2);
  }
  sx.restore();sx.globalAlpha=1;

  // --- 3. carve ORGANIC texture (2D-noise driven, never parallel) ---
  sx.globalCompositeOperation='destination-out';
  const er=3.0, eraser=makeTip(er,0,0,100);
  const dphase=rng()*TAU;
  for(const st of stations){
    const h2=st.w*0.5;if(h2<0.6)continue;
    const NL=Math.max(5,(h2/2)|0);
    const tail=smooth(0.44,1.0,st.t)*tailDry;
    for(let j=0;j<=NL;j++){
      const lat=(j/NL)*2-1;
      const edge=smooth(0.55,1.0,Math.abs(lat))*edgeRough;
      let dry=Math.max(tail,edge,bodyTex);
      dry=Math.min(1,dry*(0.85+0.3*Math.sin(st.t*5+dphase)));
      const x=st.x+st.nx*lat*h2+(rng()-0.5)*4, y=st.y+st.ny*lat*h2+(rng()-0.5)*4;
      if(x<0||x>=W||y<0||y>=H)continue;
      const g=grain[(y|0)*W+(x|0)];
      const e=dry*P.grainStrength-g;
      if(e>0.02){sx.globalAlpha=Math.min(0.95,e*1.8);sx.drawImage(eraser,x-er,y-er,er*2,er*2);}
    }
  }
  sx.globalAlpha=1;sx.globalCompositeOperation='source-over';

  // --- 4. a little spatter flung past the tail ---
  const end=stations[stations.length-1], pre=stations[Math.max(0,stations.length-3)];
  if(end){
    let tx=end.x-pre.x,ty=end.y-pre.y;const tl=Math.hypot(tx,ty)||1;tx/=tl;ty/=tl;
    sx.fillStyle=baseCss;
    for(let k=0;k<9;k++){
      const d=10+rng()*55, off=(rng()-0.5)*26, r=0.6+rng()*1.7;
      sx.globalAlpha=0.2+rng()*0.45;
      sx.beginPath();sx.arc(end.x+tx*d-ty*off, end.y+ty*d+tx*off, r, 0, TAU);sx.fill();
    }
    sx.globalAlpha=1;
  }

  ctx.globalCompositeOperation='source-over';
  ctx.drawImage(sl,0,0);
}

// ---------- render ----------
window.renderStroke=function(over){
  const P=Object.assign({},PARAMS,over||{});
  const cv=document.getElementById('c');cv.width=P.W;cv.height=P.H;
  const ctx=cv.getContext('2d');
  // background
  ctx.fillStyle=P.bg;ctx.fillRect(0,0,P.W,P.H);
  const grain=buildGrain(P.W,P.H,mulberry32((P.seed*99+1)>>>0));
  // faint paper tooth on bg
  const id=ctx.getImageData(0,0,P.W,P.H),d=id.data;
  for(let i=0,p=0;i<grain.length;i++,p+=4){const n=(grain[i]-0.5)*10;d[p]+=n;d[p+1]+=n;d[p+2]+=n;}
  ctx.putImageData(id,0,0);
  // one hero stroke (gentle arc, L->R)
  const pts=[{x:120,y:360},{x:430,y:250},{x:760,y:300},{x:1080,y:200},{x:1480,y:300}];
  drawStroke(ctx,grain,P,pts,P.color);
  window.__done=true;
};
window.renderStroke();
</script>
